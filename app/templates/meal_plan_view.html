{% extends "base.html" %}
{% block content %}
<style>
    .markdown-content {
        white-space: pre-wrap;
        line-height: 1.4;
        text-align: left;
        padding: 20px;
    }

    .markdown-content h3 {
        margin-top: 5px;
        margin-bottom: 10px;
        color: #2c3e50;
        font-size: 1.4rem;
        border-bottom: 1px solid #eee;
    }

    .markdown-content p {
        margin: 0;
    }

    .markdown-content hr {
        margin: 20px 0;
        border: 0;
        border-top: 1px solid #ddd;
    }

     .btn-primary {
        background-color: #7da0b1;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }
    .action-area {
        display: flex;
        justify-content: center;
        margin-top: 30px;
        margin-bottom: 20px;
    }

    hr {
        border: 0;
        border-top: 1px solid #ddd;
        margin-top: 40px;
    }
</style>

<main class="plan-result">
    <h2>Your Plan</h2>
    <div class="markdown-content">
        {{ plan | safe }}
    </div>
    <hr>
    <div class="action-area">
    <a href="{{ url_for('main.ai_planner') }}" class="btn-primary">Create Another Plan</a>
    </div>
</main>
{% endblock %}
