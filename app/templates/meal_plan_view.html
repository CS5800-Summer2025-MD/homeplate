{% extends "base.html" %}
{% block content %}
<style>
    .markdown-content {
        white-space: pre-wrap;
        line-height: 1.4;
        text-align: left;
        padding: 20px;
    }

    .markdown-content h3 {
        margin-top: 5px;
        margin-bottom: 10px;
        color: #2c3e50;
        font-size: 1.4rem;
        border-bottom: 1px solid #eee;
    }

    .markdown-content p {
        margin: 0;
    }

    .markdown-content hr {
        margin: 20px 0;
        border: 0;
        border-top: 1px solid #ddd;
    }

     .btn-primary {
        background-color: #7da0b1;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }
    .action-area {
        display: flex;
        justify-content: center;
        margin-top: 30px;
        margin-bottom: 20px;
    }

    hr {
        border: 0;
        border-top: 1px solid #ddd;
        margin-top: 40px;
    }

   @media print {
        @page {
            margin: 0.5in;
        }

        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: auto !important;
            background: white !important;
        }

        header, .navbar {
            position: static !important;
            display: block !important;
            width: 100% !important;
            height: auto !important; /* Forces it to only be as tall as the logo */
            margin: 0 0 10px 0 !important; /* Small gap below logo */
            padding: 0 !important;
            text-align: center !important;
        }

        header img, .brand-logo {
            max-height: 60px !important;
            margin: 0 auto !important;
        }

        nav a, .nav-links, .action-area, footer, .btn, .welcome-text {
            display: none !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .main-content, .container, .markdown-content {
            margin-top: 0 !important;
            padding-top: 0 !important;
            position: static !important;
            display: block !important;
        }
        * {
            position: static !important;
            overflow: visible !important;
        }

        h3, p, strong {
            page-break-inside: avoid;
        }
    }

    .btn-secondary {
        background-color: #6c757d;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 10px;
        font-size: 1rem;
    }
</style>

<main class="plan-result">
    <h2>Your Plan</h2>
    <div class="markdown-content">
        {{ plan | safe }}
    </div>
    <hr>
    <div class="action-area">
        <button onclick="window.print()" class="btn-secondary">Print to PDF</button>
        <a href="{{ url_for('main.ai_planner') }}" class="btn-primary">Create Another Plan</a>
    </div>
</main>
{% endblock %}
