<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomePlate++ | Smart Recipes</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>HomePlate++</h1>
        <nav class="navbar-container">
    <div class="nav-spacer"></div>

    <div class="nav-links-center">
        <a href="{{ url_for('main.index') }}">Home</a>
        <a href="{{ url_for('main.add_recipe') }}">+ Add Recipe</a>
        <a href="{{ url_for('main.ai_planner') }}" class="nav-special">AI Planner</a>
        <a href="/api/recipes">API View</a>
         {% if current_user.is_authenticated %}
                <span>Welcome, {{ current_user.username }}</span>
                <a href="{{ url_for('main.logout') }}">Logout</a>
            {% else %}
                <a href="{{ url_for('main.login') }}">Login</a>
                <a href="{{ url_for('main.register') }}">Register</a>
            {% endif %}
    </div>

    <div class="search-container">
        <form action="{{ url_for('main.search') }}" method="GET" class="search-form">
            <input type="search" name="q" class="search-input" placeholder="Search recipes..." value="{{ search_query or '' }}">
            <button type="submit" class="search-button">Search</button>
        </form>
    </div>
</nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 HomePlate++ Project | Master's Project Prototype</p>
    </footer>
</body>
</html>
